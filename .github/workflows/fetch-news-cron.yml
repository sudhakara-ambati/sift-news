name: Fetch news (cron)

on:
  schedule:
    # Every 3 hours, but not at the top of the hour (GitHub schedules can be delayed during peak times).
    - cron: "17 */3 * * *"
  workflow_dispatch: {}

concurrency:
  group: fetch-news-cron
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger cron endpoint
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ]; then
            echo "Missing CRON_URL secret"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          echo "Fetching news at $(date -u +%FT%TZ)"
          response=$(curl -fsS "$CRON_URL" \
            -H "authorization: Bearer $CRON_SECRET" \
            -H "user-agent: github-actions-cron")
          echo "Response: $response"
          # Fail the job if the pipeline didn't process any articles.
          if ! echo "$response" | grep -q '"ok":true'; then
            echo "Cron endpoint did not return ok:true"
            exit 1
          fi
